<svg width="100%" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A local-only seller: Anna's lemons won't ship, so only nearby buyers can see the listing.">
<style>text{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#44443f}</style>
<circle cx="340" cy="180" r="110" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 4"/>
<text x="340" y="73" text-anchor="middle">Anna's reach — local pickup only</text>
<circle cx="340" cy="180" r="8" fill="#D85A30"/>
<text x="340" y="205" text-anchor="middle">Anna — lemons (won't ship)</text>
<circle cx="285" cy="150" r="6" fill="#639922"/>
<text x="285" y="135" text-anchor="middle">neighbour</text>
<circle cx="390" cy="225" r="6" fill="#639922"/>
<circle cx="525" cy="138" r="6" fill="#888780"/>
<text x="525" y="123" text-anchor="middle">interstate</text>
<circle cx="180" cy="258" r="6" fill="#888780"/>
<circle cx="240" cy="320" r="6" fill="#639922"/>
<text x="254" y="324">can buy — sees the listing</text>
<circle cx="440" cy="320" r="6" fill="#888780"/>
<text x="454" y="324">too far — never sees it</text>
</svg>

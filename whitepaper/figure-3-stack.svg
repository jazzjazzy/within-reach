<svg viewBox="0 0 720 410" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="720" height="410" fill="#FFFFFF"/>
  <style>
    .lbl { font-size: 20px; font-weight: 700; fill: #1F2937; }
    .sub { font-size: 13px; fill: #6B7280; }
    .subi { font-size: 13px; font-style: italic; fill: #6B7280; }
    .tag { font-size: 13px; font-weight: 700; fill: #B45309; }
    .base { font-size: 14px; font-style: italic; fill: #6B7280; }
  </style>

  <!-- Layer 1: apps -->
  <rect x="160" y="40" width="400" height="78" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="360" y="73" text-anchor="middle" class="lbl">Buyer &amp; seller apps</text>
  <text x="360" y="97" text-anchor="middle" class="sub">what people see and tap</text>

  <line x1="360" y1="118" x2="360" y2="148" stroke="#D1D5DB" stroke-width="2"/>

  <!-- Layer 2: reach layer (highlighted) -->
  <rect x="160" y="148" width="400" height="86" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="360" y="181" text-anchor="middle" class="lbl">Reach layer</text>
  <text x="360" y="205" text-anchor="middle" class="sub">location + reach · the matching rule</text>
  <line x1="562" y1="186" x2="572" y2="186" stroke="#F59E0B" stroke-width="2"/>
  <text x="578" y="184" class="tag">the only</text>
  <text x="578" y="200" class="tag">new part</text>

  <line x1="360" y1="234" x2="360" y2="264" stroke="#D1D5DB" stroke-width="2"/>

  <!-- Layer 3: engine -->
  <rect x="160" y="264" width="400" height="86" rx="10" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="360" y="294" text-anchor="middle" class="lbl">Commerce engine</text>
  <text x="360" y="317" text-anchor="middle" class="sub">listings · carts · payments · accounts</text>
  <text x="360" y="335" text-anchor="middle" class="subi">forked from open source — or built yourself</text>

  <!-- base note -->
  <text x="360" y="388" text-anchor="middle" class="base">Runs on a single platform — or a federated protocol</text>
</svg>
